# A generic, single database configuration.

[alembic]
# path to migration scripts.
script_location = migrations

# templates used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path prepend path prepended, ';' separated
prepend_sys_path = .

# The sqlalchemy.url value to use
sqlalchemy.url = postgresql+psycopg2://capohorn:capohorn_secret@db:5432/capohornlab

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
